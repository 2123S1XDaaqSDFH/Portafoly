<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOEX® | Agencia Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@100;300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --gold-grad: linear-gradient(135deg, #c5a059 0%, #f7efad 50%, #c5a059 100%);
            --red-action: #d40000;
            --black: #000000;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: var(--black); 
            font-family: 'Montserrat', sans-serif; 
            color: var(--white); 
            overflow-x: hidden;
        }

        /* LUCES DINÁMICAS SIEMPRE EN MOVIMIENTO */
        .bg-lights {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .light {
            position: absolute;
            width: 80vw;
            height: 80vw;
            border-radius: 50%;
            filter: blur(160px);
            opacity: 0.08;
            animation: moveLights 20s infinite alternate ease-in-out;
        }

        .light-gold { background: var(--gold); top: -20%; left: -20%; }
        .light-red { background: var(--red-action); bottom: -20%; right: -20%; animation-delay: -10s; }

        @keyframes moveLights {
            0% { transform: translate(0,0) scale(1); }
            50% { transform: translate(15vw, 10vh) scale(1.1); }
            100% { transform: translate(-10vw, 20vh) scale(1); }
        }

        /* LOADER CON LLUVIA DE DINERO */
        #loader-portal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--white);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .money {
            position: absolute;
            top: -50px;
            font-size: 2rem;
            z-index: 10001;
            pointer-events: none;
        }

        .intro-content {
            text-align: center;
            z-index: 10002;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .intro-word {
            font-family: 'Cinzel', serif;
            color: var(--black);
            font-weight: 900;
            letter-spacing: 15px;
            opacity: 0;
        }

        .word-bienvenido { font-size: 3vw; margin-bottom: 10px; }
        .word-a { font-size: 2vw; margin-bottom: 10px; }
        .word-joex { font-size: 6vw; letter-spacing: 25px; }

        /* BOTÓN FLOTANTE WHATSAPP */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: 0.3s;
        }
        .whatsapp-float:hover { transform: scale(1.1); }
        .whatsapp-float img { width: 35px; }

        /* CONTENIDO PRINCIPAL */
        #app-canvas { position: relative; z-index: 10; opacity: 0; }
        
        .nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 8%; position: fixed; width: 100%; top: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100;
        }

        .gold-logo {
            font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 900;
            background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero-title { font-family: 'Cinzel', serif; font-size: 5vw; }
        .gold-text { background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .portfolio-header { text-align: center; padding: 60px 0; }
        .portfolio-header h2 { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--gold); }
        .portfolio-header p { font-size: 1rem; letter-spacing: 4px; color: #555; text-transform: uppercase; }

        .project-row { padding: 100px 10%; border-bottom: 1px solid #111; text-align: center; }
        .project-info h3 { font-family: 'Cinzel', serif; font-size: 2.5rem; margin-bottom: 15px; }
        .btn-project { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); padding-bottom: 5px; }

        .mega-cta { padding: 100px 0; text-align: center; }
        .btn-red-action {
            background: var(--red-action); color: #fff; padding: 25px 60px;
            font-size: 1.8rem; font-weight: 900; text-decoration: none; border-radius: 5px;
            box-shadow: 0 0 30px rgba(212,0,0,0.3); display: inline-block;
        }

        .legal-footer { padding: 40px; text-align: center; font-size: 0.7rem; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div class="bg-lights">
        <div class="light light-gold"></div>
        <div class="light light-red"></div>
    </div>

    <a href="https://wa.me/573184499437" class="whatsapp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <div id="loader-portal">
        <div class="intro-content">
            <h1 class="intro-word word-bienvenido">BIENVENIDO</h1>
            <h1 class="intro-word word-a">A</h1>
            <h1 class="intro-word word-joex">JOEX</h1>
        </div>
    </div>

    <div id="app-canvas">
        <nav class="nav">
            <div class="gold-logo">JOEX<span>®</span></div>
        </nav>

        <section class="hero">
            <div class="hero-inner">
                <h1 class="hero-title">No creamos webs,<br><span class="gold-text">creamos LEGADOS</span></h1>
            </div>
        </section>

        <section id="proyectos">
            <div class="portfolio-header">
                <h2>PORTAFOLIO</h2>
                <p>Nuestras páginas creadas</p>
            </div>

            <div class="project-row">
                <div class="project-info">
                    <h3>PC GAMER BUENOS AIRES</h3>
                    <p>High-End Hardware Ecosystem.</p>
                    <a href="https://2123s1xdaaqsdfh.github.io/PC-GAMER/" target="_blank" class="btn-project">Explorar Sistema</a>
                </div>
            </div>

            <div class="project-row">
                <div class="project-info">
                    <h3>PROSPEKTA</h3>
                    <p>BPO & Lead Generation Engine.</p>
                    <a href="https://2123s1xdaaqsdfh.github.io/Prospekta/" target="_blank" class="btn-project">Explorar Sistema</a>
                </div>
            </div>

            <div class="mega-cta">
                <a href="https://wa.me/573184499437" class="btn-red-action">¡QUIERO LA MÍA!</a>
            </div>
        </section>

        <footer class="legal-footer">
            <p>MARCA REGISTRADA JOEX ® 2026.</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        // FUNCIÓN LLUVIA DE DINERO
        function createMoney() {
            const symbols = ['$', '💵', '💰', '💸'];
            for(let i = 0; i < 50; i++) {
                const money = document.createElement('div');
                money.className = 'money';
                money.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                money.style.left = Math.random() * 100 + 'vw';
                money.style.animationDuration = (Math.random() * 2 + 1) + 's';
                money.style.opacity = Math.random();
                document.getElementById('loader-portal').appendChild(money);
                
                gsap.to(money, {
                    y: '110vh',
                    x: (Math.random() - 0.5) * 200,
                    rotation: Math.random() * 360,
                    duration: Math.random() * 2 + 1,
                    delay: Math.random() * 2,
                    ease: "none",
                    repeat: -1
                });
            }
        }

        window.addEventListener('load', () => {
            createMoney();
            const tl = gsap.timeline();

            // SINCRONIZACIÓN DE LETRAS
            tl.to(".word-bienvenido", { opacity: 1, y: -10, duration: 0.8 })
              .to(".word-a", { opacity: 1, y: -10, duration: 0.6 }, "-=0.2")
              .to(".word-joex", { opacity: 1, y: -10, duration: 1, ease: "back.out(1.7)" }, "-=0.2")
              .to("#loader-portal", { y: "-100%", duration: 1.2, ease: "expo.inOut", delay: 1 })
              .to("#app-canvas", { opacity: 1, duration: 0.5 }, "-=0.5");
        });
    </script>
</body>
</html>
